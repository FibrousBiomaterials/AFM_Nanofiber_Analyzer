# Allow inline markup to touch CJK characters directly.
#
# Default reStructuredText requires whitespace or ASCII punctuation around
# inline markup, so a Japanese docstring like ``ka``（ラジアン） makes docutils
# report an unterminated literal. The alternative is to litter the bilingual
# docstrings with backslash-space escapes, which would hurt the Japanese lines
# that maintainers read through IDE hovers and help().
#
# RST の既定ではインラインマークアップの前後に半角空白か ASCII 記号が必要で、
# 全角括弧や読点が続く日本語 docstring は「閉じ記号なし」と誤判定される。
# この設定で回避することで、docstring 側にエスケープを埋め込まずに済む。
#
# docutils reads this file from the process working directory, so the docs must
# be built with docs/ as the working directory. The build command in README.md
# and in .github/workflows/docs.yml does this; running sphinx from the repository
# root would silently skip this file and reintroduce the warnings.

[restructuredtext parser]
character_level_inline_markup: yes
