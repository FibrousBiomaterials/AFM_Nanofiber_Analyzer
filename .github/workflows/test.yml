# Run the pytest suite on every push and pull request.
# The matrix covers the primary target platform (Windows) plus Linux, on the
# oldest broadly wheel-supported and a recent Python version.
# push / pull request ごとに pytest スイートを実行する。マトリクスは主対象の
# Windows と Linux、および wheel 供給が安定している新旧 2 つの Python を覆う。
name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Lint runs once: Ruff results do not depend on OS or Python version, so the
  # full test matrix below does not need to repeat it.
  # Lint は 1 回だけ実行する。Ruff の結果は OS や Python バージョンに依存しない
  # ため、下のテストマトリクスで繰り返す必要はない。
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Ruff
        run: python -m pip install ruff

      - name: Lint with Ruff
        run: ruff check .

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # opencv-python (non-headless) needs libGL at import time on Linux, and
      # the GUI tests need a display: Xvfb provides a virtual one so the Tk
      # windows can be built on a headless runner. Without it those tests skip.
      # Linux では opencv-python (非 headless) の import に libGL が必要。また
      # GUI テストは表示装置を要求するため、Xvfb で仮想ディスプレイを与えて
      # ヘッドレスランナーでも Tk ウィンドウを構築できるようにする（無い場合は
      # 当該テストはスキップされる）。
      - name: Install OpenCV and X server system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 xvfb

      - name: Install package with test dependencies
        run: python -m pip install -e ".[dev]"

      # Fails on drift between code imports, pyproject dependencies,
      # and the installed environment.
      # コードの import・pyproject の依存宣言・実環境のずれを検出して失敗させる。
      - name: Check dependency consistency
        run: python check.py --verify

      # Windows runners have a real desktop session, so Tk works directly.
      # Windows ランナーは実デスクトップセッションを持つため Tk はそのまま動く。
      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: python -m pytest -v

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a python -m pytest -v
