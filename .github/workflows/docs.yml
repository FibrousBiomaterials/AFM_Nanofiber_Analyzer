# Build the Sphinx API reference and publish it to GitHub Pages.
# Pull requests build only, so a broken docstring fails review before it lands;
# pushes to main also deploy.
# Sphinx による API リファレンスをビルドし、GitHub Pages に公開する。
# pull request ではビルドのみを行い、main への push で公開まで実行する。
name: docs

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Two pushes to main in quick succession would otherwise start two deployments
# that race for the same Pages site and fail one of them. Queue them instead of
# cancelling: a superseded run still deploys, and the last one wins.
# 短時間に main へ 2 回 push すると、同一の Pages サイトへ同時にデプロイしようと
# して一方が失敗する。キャンセルではなくキューイングし、最後の実行を反映させる。
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      # autodoc imports every lib module, so the runtime dependencies must be
      # present; opencv-python (non-headless) needs libGL at import time.
      # autodoc は lib の各モジュールを実 import するため実行時依存が必要で、
      # Linux では opencv-python (非 headless) の import に libGL が要る。
      - name: Install OpenCV system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1

      - name: Install package with docs dependencies
        run: python -m pip install -e ".[docs]"

      # Build from docs/ so docutils picks up docs/docutils.conf, which lets
      # inline markup sit next to Japanese characters in the bilingual
      # docstrings.
      # docs/ を作業ディレクトリにして docs/docutils.conf を読ませる。これが
      # 無いと日本語 docstring 中のインラインマークアップが警告になる。
      - name: Build HTML documentation
        working-directory: docs
        run: python -m sphinx -b html . _build/html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  # Deploy only from main; pull requests stop after the build job above.
  # 公開は main からのみ行う。pull request は上のビルドで終了する。
  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
